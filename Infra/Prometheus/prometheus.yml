global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: 'core-api-otel'
    static_configs:
      - targets:
          - host.docker.internal:9464
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'k6-metrics'
    static_configs:
      - targets:
          - host.docker.internal:5665
    scrape_interval: 5s
    scrape_timeout: 3s

  - job_name: 'pgbouncer'
    static_configs:
      - targets:
          - pgbouncer-exporter:9127
    scrape_interval: 15s
    scrape_timeout: 10s
