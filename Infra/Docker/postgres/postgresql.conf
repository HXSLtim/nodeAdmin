# PostgreSQL configuration for nodeAdmin
# This file contains performance monitoring and optimization settings

# ============================================================================
# Query Performance Monitoring
# ============================================================================

# Enable pg_stat_statements extension
shared_preload_libraries = 'pg_stat_statements'

# pg_stat_statements configuration
pg_stat_statements.track = all              # Track all queries (top-level + nested)
pg_stat_statements.max = 10000              # Track up to 10,000 distinct queries
pg_stat_statements.track_utility = on       # Track utility commands (CREATE, DROP, etc.)

# ============================================================================
# Slow Query Logging
# ============================================================================

# Log queries taking longer than 100ms
log_min_duration_statement = 100

# Enhanced log line prefix with context information
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# Log additional query details
log_statement = 'none'                      # Don't log all statements (only slow ones)
log_duration = off                          # Duration is already in log_min_duration_statement
log_connections = on                        # Log connection attempts
log_disconnections = on                     # Log disconnections
log_lock_waits = on                         # Log lock waits (helps identify contention)

# ============================================================================
# Connection and Performance Settings
# ============================================================================

# Listen on all interfaces to allow PgBouncer connections
listen_addresses = '*'

# Maximum connections (must be >= PgBouncer max_db_connections)
# Increased to 200 to support PgBouncer 100 backend connections + overhead
max_connections = 200

# Statement timeout (prevent runaway queries)
# Can be overridden per-session with SET statement_timeout
statement_timeout = 30000                   # 30 seconds

# Lock timeout (prevent indefinite lock waits)
lock_timeout = 10000                        # 10 seconds

# Idle in transaction timeout (prevent abandoned transactions)
idle_in_transaction_session_timeout = 60000 # 60 seconds

# ============================================================================
# Memory Settings (adjust based on available RAM)
# ============================================================================

shared_buffers = 256MB                      # 25% of RAM for small instances
effective_cache_size = 1GB                  # Estimate of OS cache
work_mem = 4MB                              # Per-operation memory
maintenance_work_mem = 64MB                 # For VACUUM, CREATE INDEX

# ============================================================================
# Write-Ahead Log (WAL) Settings
# ============================================================================

wal_level = replica                         # Enable replication (for future read replicas)
max_wal_senders = 3                         # Support up to 3 replicas
wal_keep_size = 128MB                       # Keep 128MB of WAL for replicas

# ============================================================================
# Autovacuum Settings
# ============================================================================

autovacuum = on                             # Enable automatic VACUUM
autovacuum_max_workers = 3                  # Number of autovacuum workers
autovacuum_naptime = 60s                    # Check for work every 60 seconds

# ============================================================================
# Logging Destination
# ============================================================================

log_destination = 'stderr'                  # Log to stderr (captured by Docker)
logging_collector = off                     # Docker handles log collection
