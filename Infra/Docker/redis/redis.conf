# Redis configuration for nodeAdmin
# This file contains persistence and performance settings

# ============================================================================
# Persistence - AOF (Append Only File)
# ============================================================================
# Fsync every second (good balance)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
# Don't skip fsync during rewrite
no-appendfsync-on-rewrite no
# Rewrite when AOF grows 100%
auto-aof-rewrite-percentage 100
# Minimum size for rewrite
auto-aof-rewrite-min-size 64mb

# ============================================================================
# Persistence - RDB (Snapshot)
# ============================================================================
# Save after 900s if 1 key changed
save 900 1
# Save after 300s if 10 keys changed
save 300 10
# Save after 60s if 10000 keys changed
save 60 10000
# Stop writes if RDB save fails
stop-writes-on-bgsave-error yes
# Compress RDB files
rdbcompression yes
# Checksum RDB files
rdbchecksum yes
# RDB filename
dbfilename dump.rdb

# ============================================================================
# Memory Management
# ============================================================================
# Maximum memory limit
maxmemory 512mb
# Evict least recently used keys
maxmemory-policy allkeys-lru
# LRU sample size
maxmemory-samples 5

# ============================================================================
# Networking
# ============================================================================
# Close idle connections after 300s
timeout 300
# TCP keepalive interval
tcp-keepalive 60

# ============================================================================
# Logging
# ============================================================================
# Log level: debug, verbose, notice, warning
loglevel notice
# Log to stdout (Docker captures)
logfile ""

# ============================================================================
# Slow Log
# ============================================================================
# Log commands slower than 10ms
slowlog-log-slower-than 10000
# Keep last 128 slow commands
slowlog-max-len 128
