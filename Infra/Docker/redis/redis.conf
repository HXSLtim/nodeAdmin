# Redis configuration for nodeAdmin
# This file contains persistence and performance settings

# ============================================================================
# Persistence - AOF (Append Only File)
# ============================================================================
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec                    # Fsync every second (good balance)
no-appendfsync-on-rewrite no            # Don't skip fsync during rewrite
auto-aof-rewrite-percentage 100         # Rewrite when AOF grows 100%
auto-aof-rewrite-min-size 64mb          # Minimum size for rewrite

# ============================================================================
# Persistence - RDB (Snapshot)
# ============================================================================
save 900 1                              # Save after 900s if 1 key changed
save 300 10                             # Save after 300s if 10 keys changed
save 60 10000                           # Save after 60s if 10000 keys changed
stop-writes-on-bgsave-error yes         # Stop writes if RDB save fails
rdbcompression yes                      # Compress RDB files
rdbchecksum yes                         # Checksum RDB files
dbfilename dump.rdb                     # RDB filename

# ============================================================================
# Memory Management
# ============================================================================
maxmemory 512mb                         # Maximum memory limit
maxmemory-policy allkeys-lru            # Evict least recently used keys
maxmemory-samples 5                     # LRU sample size

# ============================================================================
# Networking
# ============================================================================
timeout 300                             # Close idle connections after 300s
tcp-keepalive 60                        # TCP keepalive interval

# ============================================================================
# Logging
# ============================================================================
loglevel notice                         # Log level: debug, verbose, notice, warning
logfile ""                              # Log to stdout (Docker captures)

# ============================================================================
# Slow Log
# ============================================================================
slowlog-log-slower-than 10000           # Log commands slower than 10ms
slowlog-max-len 128                     # Keep last 128 slow commands
