name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ── Parallel: Static Analysis ────────────────────────────────────────────
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint

  # ── Parallel: Unit Tests (backend + frontend) ────────────────────────────
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: CoreApi unit tests
        run: npm run test:coreApi
      - name: AdminPortal unit tests
        run: npm run test:adminPortal

  # ── Parallel: Security Audit ─────────────────────────────────────────────
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Check audit-ci allowlist expiry
        run: node scripts/checkAuditAllowlistExpiry.cjs
      - name: audit-ci (gate on high+ with documented allowlist)
        run: npx audit-ci --config audit-ci.jsonc

  # ── Parallel: Build (artifacts shared with downstream jobs) ──────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-dist
          path: |
            apps/coreApi/dist
            apps/adminPortal/dist
          retention-days: 1
          if-no-files-found: error

  # ── Sequential: Integration + Acceptance ─────────────────────────────────
  test-integration:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-dist
          path: .

      - name: Setup Infrastructure
        uses: ./.github/actions/setup-stack

      - name: Integration Tests
        run: npm run test:coreApi:integration

      - name: M2 Acceptance
        run: npm run m2:acceptance:auto
        timeout-minutes: 5
        env:
          M2_INCLUDE_PGBOUNCER_SMOKE: skip

      - name: Collect docker logs on failure
        if: failure()
        run: docker compose logs --no-color > docker-logs.txt || true

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-logs-test-integration
          path: docker-logs.txt
          if-no-files-found: ignore

      - name: Shutdown Infrastructure
        if: always()
        run: docker compose down

  # NOTE: E2E (Playwright) job was intentionally removed in c33a0fc due to
  # CI-environment-specific flakiness. Re-add only after the underlying root
  # cause is addressed. Run locally with: npm run test:e2e:web

  # ── Parallel: Docker image build validation (no push) ────────────────────
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build CoreApi image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/coreApi/Dockerfile
          push: false
          tags: nodeadmin/coreapi:ci
          cache-from: type=gha,scope=coreapi
          cache-to: type=gha,scope=coreapi,mode=max
      - name: Build AdminPortal image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/adminPortal/Dockerfile
          push: false
          tags: nodeadmin/adminportal:ci
          cache-from: type=gha,scope=adminportal
          cache-to: type=gha,scope=adminportal,mode=max
