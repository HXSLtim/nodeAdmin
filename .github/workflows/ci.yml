name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ── Parallel: Static Analysis ────────────────────────────────────────────
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - name: Naming conventions
        run: node scripts/checkNamingConventions.cjs
      - name: Layer dependencies
        run: node scripts/checkLayerDependencies.cjs
      - name: Doc drift
        run: node scripts/checkDocDrift.cjs

  # ── Parallel: Unit Tests (backend + frontend) ────────────────────────────
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: CoreApi unit tests
        run: npm run test:coreApi
      - name: AdminPortal unit tests
        run: npm run test:adminPortal

  # ── Parallel: Security Audit ─────────────────────────────────────────────
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Check audit-ci allowlist expiry
        run: node scripts/checkAuditAllowlistExpiry.cjs
      - name: audit-ci (gate on high+ with documented allowlist)
        run: npx audit-ci --config audit-ci.jsonc

  # ── Parallel: Build (artifacts shared with downstream jobs) ──────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-dist
          path: |
            apps/coreApi/dist
            apps/adminPortal/dist
          retention-days: 1
          if-no-files-found: error

  # ── Sequential: Integration + Acceptance ─────────────────────────────────
  test-integration:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-dist
          path: .

      - name: Setup Infrastructure
        uses: ./.github/actions/setup-stack

      - name: Integration Tests
        run: npm run test:coreApi:integration

      - name: M2 Acceptance
        run: npm run m2:acceptance:auto
        timeout-minutes: 5
        env:
          M2_INCLUDE_PGBOUNCER_SMOKE: skip

      - name: Collect docker logs on failure
        if: failure()
        run: docker compose logs --no-color > docker-logs.txt || true

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-logs-test-integration
          path: docker-logs.txt
          if-no-files-found: ignore

      - name: Shutdown Infrastructure
        if: always()
        run: docker compose down

  # ── Sequential: E2E (Playwright) ─────────────────────────────────────────
  e2e:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-dist
          path: .

      - run: npx playwright install --with-deps chromium

      - name: Setup Infrastructure
        uses: ./.github/actions/setup-stack

      - name: Seed Test Data
        run: node scripts/seed-test-data.cjs

      - name: Start CoreApi
        run: |
          AUTH_ENABLE_DEV_TOKEN_ISSUE=true \
          DATABASE_URL=postgres://nodeadmin:nodeadmin@localhost:55432/nodeadmin \
          FRONTEND_ORIGINS=http://localhost:3000 \
          JWT_ACCESS_SECRET=ci-access-secret \
          JWT_REFRESH_SECRET=ci-refresh-secret \
          KAFKA_BROKERS=localhost:9092 \
          OUTBOX_PUBLISHER_ENABLED=true \
          OUTBOX_TOPIC=im.events \
          PORT=11451 \
          node apps/coreApi/dist/main.js &

      - name: Wait for CoreApi
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:11451/api/v1/health > /dev/null 2>&1; then
              echo "CoreApi ready"
              break
            fi
            echo "Waiting for CoreApi... attempt $i/60"
            sleep 2
          done
          # Final check — fail the job if CoreApi never came up
          curl -sf http://127.0.0.1:11451/api/v1/health > /dev/null

      - name: Run E2E Tests
        run: npm run test:e2e -w adminPortal
        env:
          ADMIN_PORTAL_BASE_URL: http://127.0.0.1:3000
          CI: 'true'

      - name: Upload Playwright Artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: |
            apps/adminPortal/test-results/
            apps/adminPortal/playwright-report/
          retention-days: 7

      - name: Shutdown
        if: always()
        run: |
          pkill -f "apps/coreApi/dist/main.js" 2>/dev/null || true
          docker compose down

  # ── Parallel: Docker image build validation (no push) ────────────────────
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build CoreApi image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/coreApi/Dockerfile
          push: false
          tags: nodeadmin/coreapi:ci
          cache-from: type=gha,scope=coreapi
          cache-to: type=gha,scope=coreapi,mode=max
      - name: Build AdminPortal image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/adminPortal/Dockerfile
          push: false
          tags: nodeadmin/adminportal:ci
          cache-from: type=gha,scope=adminportal
          cache-to: type=gha,scope=adminportal,mode=max
