name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Parallel: Static Analysis ────────────────────────────────────────────
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint

  # ── Parallel: Unit Tests ─────────────────────────────────────────────────
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coreApi

  # ── Parallel: Build ──────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  # ── Sequential: Integration + Acceptance ─────────────────────────────────
  test-integration:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Setup Infrastructure
        uses: ./.github/actions/setup-stack

      - name: Integration Tests
        run: npm run test:coreApi:integration

      - name: M2 Acceptance
        run: npm run m2:acceptance:auto
        timeout-minutes: 5
        env:
          M2_INCLUDE_PGBOUNCER_SMOKE: skip

      - name: Shutdown Infrastructure
        if: always()
        run: docker compose down

  # ── Sequential: E2E (Playwright) ─────────────────────────────────────────
  e2e:
    needs: [test-integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium

      - name: Setup Infrastructure
        uses: ./.github/actions/setup-stack

      - name: Seed Test Data
        run: node scripts/seed-test-data.cjs

      - name: Start CoreApi
        run: |
          AUTH_ENABLE_DEV_TOKEN_ISSUE=true \
          DATABASE_URL=postgres://nodeadmin:nodeadmin@localhost:55432/nodeadmin \
          FRONTEND_ORIGINS=http://localhost:3000 \
          JWT_ACCESS_SECRET=ci-access-secret \
          JWT_REFRESH_SECRET=ci-refresh-secret \
          KAFKA_BROKERS=localhost:9092 \
          OUTBOX_PUBLISHER_ENABLED=true \
          OUTBOX_TOPIC=im.events \
          PORT=11451 \
          node apps/coreApi/dist/main.js &

      - name: Wait for CoreApi
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:11451/api/v1/health > /dev/null 2>&1; then
              echo "CoreApi ready"
              break
            fi
            echo "Waiting for CoreApi... attempt $i/60"
            sleep 1
          done

      - name: Run E2E Tests
        run: npm run test:e2e -w adminPortal
        env:
          ADMIN_PORTAL_BASE_URL: http://127.0.0.1:3000

      - name: Upload Playwright Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            apps/adminPortal/test-results/
            apps/adminPortal/playwright-report/
          retention-days: 7

      - name: Shutdown
        if: always()
        run: |
          pkill -f "apps/coreApi/dist/main.js" 2>/dev/null || true
          docker compose down
