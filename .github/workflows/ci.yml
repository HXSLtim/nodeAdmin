name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Parallel: Static Analysis ────────────────────────────────────────────
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint

  # ── Parallel: Unit Tests ─────────────────────────────────────────────────
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coreApi

  # ── Parallel: Build ──────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  # ── Sequential: Integration Tests (needs infra) ──────────────────────────
  integration:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Start Infrastructure
        run: docker compose up -d postgres redis zookeeper kafka

      - name: Wait for Services
        run: |
          for port in 55432 56379 9092; do
            echo "Waiting for port $port..."
            for i in $(seq 1 30); do
              if nc -z localhost $port 2>/dev/null; then
                echo "Port $port ready"
                break
              fi
              sleep 1
            done
          done

      - name: Apply Migrations
        run: npm run db:migrate -w coreApi

      - name: Integration Tests
        run: npm run test:coreApi:integration

      - name: Shutdown Infrastructure
        if: always()
        run: docker compose down

  # ── Sequential: Acceptance Tests ─────────────────────────────────────────
  acceptance:
    needs: [integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Start Infrastructure
        run: docker compose up -d postgres redis zookeeper kafka

      - name: Wait for Services
        run: |
          for port in 55432 56379 9092; do
            echo "Waiting for port $port..."
            for i in $(seq 1 30); do
              if nc -z localhost $port 2>/dev/null; then
                echo "Port $port ready"
                break
              fi
              sleep 1
            done
          done

      - name: Apply Migrations
        run: npm run db:migrate -w coreApi

      - name: M2 Acceptance
        run: npm run m2:acceptance:auto
        timeout-minutes: 5

      - name: Shutdown Infrastructure
        if: always()
        run: docker compose down
