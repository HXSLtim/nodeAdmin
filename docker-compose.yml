services:
  coreapi:
    build:
      context: .
      dockerfile: apps/coreApi/Dockerfile
    container_name: nodeadmin-coreapi
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://nodeadmin:nodeadmin@postgres:5432/nodeadmin
      # DATABASE_URL_FILE: /run/secrets/database_url
      REDIS_URL: redis://redis:6379
      PORT: '11451'
      JWT_ACCESS_SECRET_FILE: /run/secrets/jwt_access_secret
      # JWT_ACCESS_SECRET: replace-with-a-long-random-access-secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
      # JWT_REFRESH_SECRET: replace-with-a-long-random-refresh-secret
      FRONTEND_ORIGINS: http://localhost,http://localhost:80,http://adminportal
      # KAFKA_BROKERS: kafka:29092  # Uncomment when starting with --profile kafka
    secrets:
      - postgres_password
      - jwt_access_secret
      - jwt_refresh_secret
    ports:
      - '11451:11451'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const http = require('http'); const req = http.get('http://127.0.0.1:11451/api/v1/health', r => { process.exit(r.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1)); setTimeout(() => { req.destroy(); process.exit(1); }, 3000)",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  adminportal:
    build:
      context: .
      dockerfile: apps/adminPortal/Dockerfile
    container_name: nodeadmin-adminportal
    depends_on:
      coreapi:
        condition: service_healthy
    ports:
      - '80:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: nodeadmin-postgres
    environment:
      POSTGRES_DB: nodeadmin
      POSTGRES_USER: nodeadmin
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      # POSTGRES_PASSWORD: nodeadmin
    secrets:
      - postgres_password
    ports:
      - '55432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - max_connections=200
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nodeadmin -d nodeadmin']
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer
    container_name: nodeadmin-pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./infra/docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infra/docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - '6432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -p 5432 -U nodeadmin || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  pgbouncer-exporter:
    image: prometheuscommunity/pgbouncer-exporter:v0.7.0
    profiles:
      - monitoring
    container_name: nodeadmin-pgbouncer-exporter
    depends_on:
      - pgbouncer
    environment:
      PGBOUNCER_EXPORTER_HOST: pgbouncer
      PGBOUNCER_EXPORTER_PORT: 5432
      PGBOUNCER_USER: nodeadmin
      PGBOUNCER_PASS: nodeadmin
      DATABASE_URL: 'postgresql://nodeadmin:nodeadmin@pgbouncer:5432/pgbouncer?sslmode=disable'
    ports:
      - '9127:9127'

  redis:
    image: redis:7.2-alpine
    container_name: nodeadmin-redis
    ports:
      - '56379:6379'
    volumes:
      - redis_data:/data
      - ./infra/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ['redis-server', '/usr/local/etc/redis/redis.conf']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    profiles:
      - kafka
    container_name: nodeadmin-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - '2181:2181'

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    profiles:
      - kafka
    container_name: nodeadmin-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - '9092:9092'

  nginx:
    image: nginx:1.27-alpine
    profiles:
      - tls
    container_name: nodeadmin-nginx-tls
    ports:
      - '3443:3443'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles:
      - monitoring
    container_name: nodeadmin-prometheus
    ports:
      - '9091:9090'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles:
      - monitoring
    container_name: nodeadmin-alertmanager
    ports:
      - '9093:9093'
    volumes:
      - ./infra/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    profiles:
      - monitoring
    container_name: nodeadmin-grafana
    depends_on:
      - prometheus
    ports:
      - '3003:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

  k6:
    image: grafana/k6:0.54.0
    profiles:
      - loadtest
    container_name: nodeadmin-k6
    volumes:
      - ./scripts:/scripts:ro
      - ./reports/k6:/reports
    environment:
      CORE_API_BASE_URL: 'http://host.docker.internal:11451'
      WS_BASE_URL: 'ws://host.docker.internal:11451'
      SMOKE_TENANT_ID: 'tenant-demo'
      K6_PROMETHEUS_RW_SERVER_URL: 'http://prometheus:9090/api/v1/write'
      K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: 'true'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    entrypoint: ['k6', 'run', '/scripts/k6ImLoad.js']

volumes:
  postgres_data:
  redis_data:
  grafana_data:

secrets:
  postgres_password:
    file: ./.secrets/postgres_password
  jwt_access_secret:
    file: ./.secrets/jwt_access_secret
  jwt_refresh_secret:
    file: ./.secrets/jwt_refresh_secret
