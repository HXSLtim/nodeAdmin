services:
  postgres:
    image: postgres:16
    container_name: nodeadmin-postgres
    environment:
      POSTGRES_DB: nodeadmin
      POSTGRES_USER: nodeadmin
      POSTGRES_PASSWORD: nodeadmin
    ports:
      - '55432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Infra/Docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./Infra/Docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - max_connections=200
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nodeadmin -d nodeadmin']
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer
    container_name: nodeadmin-pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./Infra/Docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./Infra/Docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - '6432:5432'

  pgbouncer-exporter:
    image: prometheuscommunity/pgbouncer-exporter:v0.7.0
    profiles:
      - monitoring
    container_name: nodeadmin-pgbouncer-exporter
    depends_on:
      - pgbouncer
    environment:
      PGBOUNCER_EXPORTER_HOST: pgbouncer
      PGBOUNCER_EXPORTER_PORT: 5432
      PGBOUNCER_USER: nodeadmin
      PGBOUNCER_PASS: nodeadmin
      DATABASE_URL: 'postgresql://nodeadmin:nodeadmin@pgbouncer:5432/pgbouncer?sslmode=disable'
    ports:
      - '9127:9127'

  redis:
    image: redis:7.2-alpine
    container_name: nodeadmin-redis
    ports:
      - '56379:6379'
    volumes:
      - redis_data:/data
      - ./Infra/Docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ['redis-server', '/usr/local/etc/redis/redis.conf']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    profiles:
      - kafka
    container_name: nodeadmin-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - '2181:2181'

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    profiles:
      - kafka
    container_name: nodeadmin-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - '9092:9092'

  nginx:
    image: nginx:1.27-alpine
    profiles:
      - tls
    container_name: nodeadmin-nginx-tls
    ports:
      - '3443:3443'
    volumes:
      - ./Infra/Nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./Infra/Nginx/certs:/etc/nginx/certs:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles:
      - monitoring
    container_name: nodeadmin-prometheus
    ports:
      - '9091:9090'
    volumes:
      - ./Infra/Prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./Infra/Prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles:
      - monitoring
    container_name: nodeadmin-alertmanager
    ports:
      - '9093:9093'
    volumes:
      - ./Infra/Prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    profiles:
      - monitoring
    container_name: nodeadmin-grafana
    depends_on:
      - prometheus
    ports:
      - '3003:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./Infra/Grafana/provisioning:/etc/grafana/provisioning:ro
      - ./Infra/Grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

  k6:
    image: grafana/k6:0.54.0
    profiles:
      - loadtest
    container_name: nodeadmin-k6
    volumes:
      - ./Scripts:/scripts:ro
      - ./Reports/k6:/reports
    environment:
      CORE_API_BASE_URL: 'http://host.docker.internal:3001'
      WS_BASE_URL: 'ws://host.docker.internal:3001'
      SMOKE_TENANT_ID: 'tenant-demo'
      K6_PROMETHEUS_RW_SERVER_URL: 'http://prometheus:9090/api/v1/write'
      K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: 'true'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    entrypoint: ['k6', 'run', '/scripts/k6ImLoad.js']

volumes:
  postgres_data:
  redis_data:
  grafana_data:
